name: Diagnose Bot

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: PM2 status + recent logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            set +e
            cd ~/whatsapp-bot
            echo "=== PM2 list ==="
            npx pm2 list
            echo
            echo "=== PM2 info ==="
            npx pm2 info whatsapp-bot
            echo
            echo "=== Last 200 log lines ==="
            npx pm2 logs whatsapp-bot --lines 200 --nostream
            echo
            echo "=== Last 100 error lines ==="
            npx pm2 logs whatsapp-bot --err --lines 100 --nostream
